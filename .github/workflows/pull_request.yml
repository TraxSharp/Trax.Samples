name: Pull Request

on:
  pull_request:
    branches: [main]

# Default to no permissions; the job widens only what it needs.
permissions: {}

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17@sha256:2203e6282d9e7de7c24d7da234e2a744fb325df366a3fd8ed940e8abbee39527
        env:
          POSTGRES_USER: trax
          POSTGRES_PASSWORD: trax123
          POSTGRES_DB: trax
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U trax"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      rabbitmq:
        image: rabbitmq:4-management@sha256:dbaf95088210b885b305e338e846d8d2ce7a2659d4b4005da8da02b885a71671
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5672:5672
        options: >-
          --health-cmd="rabbitmq-diagnostics -q ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Guard against local-dev lockfile versions
        run: |
          if grep -rln '"resolved": "1.99.99"' --include=packages.lock.json . ; then
            echo "::error::A packages.lock.json contains the local-dev version 1.99.99. Regenerate lockfiles in CI mode (remove trax-local.props) before committing."
            exit 1
          fi
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1  # v5.4.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview
      - name: Restore tools
        run: dotnet tool restore
      - name: Check formatting
        run: dotnet csharpier check .
      - name: Restore (locked)
        run: dotnet restore --locked-mode
      - name: Create test databases
        env:
          PGPASSWORD: trax123
        run: |
          for db in trax_e2e_tests chat_e2e_tests energyhub_e2e_tests jobhunt_e2e_tests bookworm_e2e_tests; do
            psql -h localhost -U trax -d trax -c "CREATE DATABASE \"$db\";"
          done
      - name: Build
        run: dotnet build Trax.Samples.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test Trax.Samples.slnx --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          directory: ./TestResults
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
